<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log into AXLE - Public Edition</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; }
        #container { margin: 20px auto; max-width: 600px; }
        canvas { border: 1px solid #000; background: #fff; }
        select, button, label { margin: 10px; padding: 5px; }
    </style>
</head>
<body>
    <div id="container">
        <h1>AXLE: Public Playground for Generative Organization</h1>
        <p>Select a General Type, spawn agents, and watch the system stabilize. Optionally control one agent in human mode.</p>
        
        <label for="typeSelector">General Type:</label>
        <select id="typeSelector">
            <option value="CoverageTopology">CoverageTopology (agents spread out)</option>
            <option value="SharedIntent">SharedIntent (agents follow leader)</option>
            <option value="RingAttractor">RingAttractor (agents form a ring)</option>
        </select>
        
        <button id="startBtn">Spawn Agents & Start Sim</button>
        <label><input type="checkbox" id="humanMode"> Enable Human Mode (arrow keys control agent 0)</label>
        
        <canvas id="simCanvas" width="500" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 500;
        const agentCount = 10; // Spawn 10 agents
        let agents = [];
        let type = 'CoverageTopology';
        let humanMode = false;
        let running = false;

        // Agent class
        class Agent {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#007bff';
                ctx.fill();
            }
        }

        // Initialize agents randomly
        function initAgents() {
            agents = [];
            for (let i = 0; i < agentCount; i++) {
                agents.push(new Agent(Math.random() * gridSize, Math.random() * gridSize));
            }
        }

        // Update based on Type invariants
        function updateAgents() {
            if (!running) return;

            for (let i = 0; i < agents.length; i++) {
                let ax = 0, ay = 0;

                if (type === 'CoverageTopology') {
                    // Repel from others for coverage
                    for (let j = 0; j < agents.length; j++) {
                        if (i !== j) {
                            const dx = agents[i].x - agents[j].x;
                            const dy = agents[i].y - agents[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
                            ax += dx / (dist * dist) * 10;
                            ay += dy / (dist * dist) * 10;
                        }
                    }
                } else if (type === 'SharedIntent') {
                    // Attract to "leader" (agent 0) with some noise
                    const leader = agents[0];
                    const dx = leader.x - agents[i].x;
                    const dy = leader.y - agents[i].y;
                    const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
                    ax += dx / dist * 0.5;
                    ay += dy / dist * 0.5;
                    ax += (Math.random() - 0.5) * 0.1; // Noise for stabilization
                    ay += (Math.random() - 0.5) * 0.1;
                } else if (type === 'RingAttractor') {
                    // Circular motion around center
                    const centerX = gridSize / 2;
                    const centerY = gridSize / 2;
                    const dx = agents[i].x - centerX;
                    const dy = agents[i].y - centerY;
                    const angle = Math.atan2(dy, dx);
                    ax += Math.cos(angle + Math.PI / 2) * 0.5; // Tangential force
                    ay += Math.sin(angle + Math.PI / 2) * 0.5;
                    // Attract to ring radius
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const targetRadius = 150;
                    ax += (targetRadius - dist) * dx / dist * 0.1;
                    ay += (targetRadius - dist) * dy / dist * 0.1;
                }

                // Apply acceleration, velocity, position (with damping)
                agents[i].vx += ax * 0.01;
                agents[i].vy += ay * 0.01;
                agents[i].vx *= 0.95; // Damping
                agents[i].vy *= 0.95;
                agents[i].x = Math.max(0, Math.min(gridSize, agents[i].x + agents[i].vx));
                agents[i].y = Math.max(0, Math.min(gridSize, agents[i].y + agents[i].vy));
            }

            // Draw
            ctx.clearRect(0, 0, gridSize, gridSize);
            agents.forEach(agent => agent.draw());

            requestAnimationFrame(updateAgents);
        }

        // Human mode controls
        document.addEventListener('keydown', (e) => {
            if (humanMode && agents.length > 0) {
                const human = agents[0];
                const speed = 5;
                if (e.key === 'ArrowUp') human.y -= speed;
                if (e.key === 'ArrowDown') human.y += speed;
                if (e.key === 'ArrowLeft') human.x -= speed;
                if (e.key === 'ArrowRight') human.x += speed;
                human.x = Math.max(0, Math.min(gridSize, human.x));
                human.y = Math.max(0, Math.min(gridSize, human.y));
            }
        });

        // Setup event listeners
        document.getElementById('typeSelector').addEventListener('change', (e) => {
            type = e.target.value;
        });
        document.getElementById('humanMode').addEventListener('change', (e) => {
            humanMode = e.target.checked;
        });
        document.getElementById('startBtn').addEventListener('click', () => {
            initAgents();
            running = true;
            updateAgents();
        });
    </script>
</body>
</html>
